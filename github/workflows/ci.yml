name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install client deps
        run: cd client && npm install

      - name: Lint client
        run: cd client && npm run lint -- --max-warnings=50

      - name: Run tests
        run: cd client && npm test -- --run
